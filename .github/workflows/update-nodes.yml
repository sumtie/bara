name: Daily Update Nodes

on:
  schedule:
    - cron: '0 4 * * *'        # UTC 每天 4:00 执行（北京时间中午 12:00）
  workflow_dispatch:

jobs:
  update-nodes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager ddddocr opencv-python-headless numpy requests

      - name: Run get_captcha_ocr.py
        run: python get_captcha_ocr.py

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 使用上海时间生成 commit 信息
          CURRENT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S CST')

          if [[ -n $(git status --porcelain) ]]; then
            git add sub/v2.txt
            git commit -m "Daily nodes update ${CURRENT_TIME}"
            git push
            echo "✅ 更新成功，已推送（上海时间：${CURRENT_TIME}）"
          else
            echo "ℹ️ 没有检测到文件变化，跳过提交"
          fi