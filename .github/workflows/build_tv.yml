name: build TV

on:
  workflow_dispatch:
    inputs:
      rebuild:
        description: '忽略构建记录以重新构建'
        required: false
        type: boolean
      # ===== 用户自定义参数 =====
      package_name:
        description: '自定义包名（如：app.ok.tv），留空则使用 app.ok.tv'
        required: false
        type: string
        default: ''
      config_url_primary:
        description: '主接口地址（索引0）'
        required: false
        type: string
        default: 'http://www.饭太硬.net/tv'
      config_url_secondary:
        description: '备用接口地址（索引1）'
        required: false
        type: string
        default: 'http://www.饭太硬.net/tv'
      # ===== 功能开关 =====
      modify_package_name:
        description: '是否修改包名'
        required: false
        type: boolean
        default: true
      remove_x86:
        description: '是否移除 x86 架构'
        required: false
        type: boolean
        default: true
      remove_mobile:
        description: '是否移除 mobile 版打包构建'
        required: false
        type: boolean
        default: true
      remove_python:
        description: '是否移除 python 版打包构建'
        required: false
        type: boolean
        default: true
      remove_updater:
        description: '是否移除更新检测'
        required: false
        type: boolean
        default: true
      enable_geek_mod:
        description: '是否开启极客修改'
        required: false
        type: boolean
        default: false
      enable_builtin_config:
        description: '是否内置接口配置'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # - userName: jadehh
          #   repoName: FongMiTV
          #   branchName: release
          #   jdkVersion: 21
          
          - userName: sumtie
            repoName: TV
            branchName: ragehao
            jdkVersion: 21
          - userName: sumtie
            repoName: TV
            branchName: hels6
            jdkVersion: 21

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure Table Format
        if: ${{ env.commit }}
        run: |
          # 检查是否存在 Build Time 列，如果不存在则添加
          if ! grep -q "| Build Time |" README.md; then
            sed -i '/| Repository.*| Branch.*| Last Update/s/|$/| Build Time |/' README.md
            sed -i '/|--*|--*|--*/s/|$/|--*|/' README.md
            sed -i '/\[.*\].*|.*|.*[a-z0-9]\{40\}/s/|$/| - |/' README.md
          fi

      - name: Check New Commit
        run: |
          upStream=https://github.com/${{ matrix.userName }}/${{ matrix.repoName }}
          echo "upStream=$upStream" >> $GITHUB_ENV
          commit=$(curl -sL $upStream/commits/${{ matrix.branchName }} |grep -o "/${{ matrix.userName }}/${{ matrix.repoName }}/commit/[a-z0-9]\+" |head -1 | cut -d\/ -f5)
          if [[ -z "${commit}" ]]; then
            commit=$(curl -s "https://api.github.com/repos/${{ matrix.userName }}/${{ matrix.repoName }}/commits/${{ matrix.branchName }}?per_page=1" | jq -r '.sha' )
          fi
          if ! grep -q "$commit" README.md || [ "${{ inputs.rebuild }}" == "true" ]; then
            echo "commit=$commit" >> $GITHUB_ENV
            echo "commitS=${commit:0:7}" >> $GITHUB_ENV
          fi
          echo "commit=$commit"

      - name: Checkout Source Code
        if: ${{ env.commit }}
        run: |
          git clone ${{ env.upStream }} TVBoxOSC
          cd TVBoxOSC
          git checkout ${{ env.commit }}
          echo "tag=$(git log --date=format:'%Y%m%d-%H%M' --pretty=format:%cd ${{ env.commitS }} -1)" >> $GITHUB_ENV

      - name: Compress Source Code
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          # clean apk file
          if [ -d "release" ]; then
            find release/ -name "*.apk" -delete
          fi
          #zip -q -x ".git/*" -x  ".github/*" -r source-${{ env.commitS }}.zip .
          tar -cJf source-${{ env.commitS }}.tar.xz --exclude=.git --exclude=.github *

      - name: Release Apk Sign
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          #应用签名修改 
          signingConfigs=''
          signingConfig='ICAgICAgICAgICAgaWYgKHByb2plY3QuaGFzUHJvcGVydHkoIlJFTEVBU0VfU1RPUkVfRklMRSIpKSB7XAogICAgICAgICAgICAgICAgc2lnbmluZ0NvbmZpZyBzaWduaW5nQ29uZmlncy5teUNvbmZpZ1wKICAgICAgICAgICAgfVwK'
          signingConfigs="$(echo "$signingConfigs" |base64 -d )"
          signingConfig="$(echo "$signingConfig" |base64 -d )"
          sed -i -e "/defaultConfig {/i\\$signingConfigs " -e "/debug {/a\\$signingConfig " -e "/release {/a\\$signingConfig " app/build.gradle

          cp -f ${{ github.workspace }}/.github/workflows/TVBoxOSC.jks app/TVBoxOSC.jks
          sed -i '$a\RELEASE_STORE_FILE=./TVBoxOSC.jks'     ./gradle.properties
          sed -i '$a\RELEASE_KEY_ALIAS=TVBoxOSC'            ./gradle.properties
          sed -i '$a\RELEASE_STORE_PASSWORD=TVBoxOSC'       ./gradle.properties
          sed -i '$a\RELEASE_KEY_PASSWORD=TVBoxOSC'         ./gradle.properties

      - name: applicationId modify
        if: ${{ env.commit && inputs.modify_package_name == true }}
        working-directory: TVBoxOSC
        run: |
          echo "修改包名以允许与原版共存"
          
          # 获取用户输入的包名，如果为空则使用默认值
          if [ -n "${{ inputs.package_name }}" ]; then
            NEW_PACKAGE_NAME="${{ inputs.package_name }}"
          else
            NEW_PACKAGE_NAME="app.ok.tv"
            echo "未指定包名，使用默认值: $NEW_PACKAGE_NAME"
          fi
          
          echo "📦 新的包名: $NEW_PACKAGE_NAME"
          
          # 修改 applicationId
          sed -i 's/applicationId "com\.fongmi\.android\.tv"/applicationId "'"$NEW_PACKAGE_NAME"'"/' app/build.gradle
          
          # fix quickjs provider authorities
          sed -i 's/authorities="com\.fongmi\.quickjs\.provider"/authorities="${applicationId}\.quickjs\.provider"/g' app/src/main/AndroidManifest.xml
          
          echo "====== app/build.gradle 修改后内容预览 ======"
          grep -A 2 -B 2 "applicationId" app/build.gradle

      - name: Remove x86
        if: ${{ env.commit && inputs.remove_x86 == true }}
        working-directory: TVBoxOSC
        run: |
          echo "移除 x86 架构"
          if [ -f "app/build.gradle" ]; then
            sed -i '/x86 {/,/^[[:space:]]*}/d' app/build.gradle
            sed -i '/^[[:space:]]*$/N;/^\s*\n\s*$/d' app/build.gradle
          fi

      - name: Remove mobile
        if: ${{ env.commit && inputs.remove_mobile == true }}
        working-directory: TVBoxOSC
        run: |
          echo "移除 mobile 版打包构建"
          sed -i '/mobile {/,/^[[:space:]]*}/d' app/build.gradle
          sed -i '/^[[:space:]]*mobileImplementation/d' app/build.gradle
          echo "====== app/build.gradle 修改后内容预览 ======"
          cat app/build.gradle

      - name: Remove python
        if: ${{ env.commit && inputs.remove_python == true }}
        working-directory: TVBoxOSC
        run: |
          echo "移除 python 版打包构建"
          sed -i '/python {/,/^[[:space:]]*}/d' app/build.gradle
          sed -i '/^[[:space:]]*pythonImplementation/d' app/build.gradle
          echo "====== app/build.gradle 修改后内容预览 ======"
          cat app/build.gradle
          sed -i "/include[[:space:]]*':pyramid'/d" settings.gradle
          echo "====== settings.gradle 修改后内容预览 ======"
          cat settings.gradle

      - name: remove Updater
        if: ${{ env.commit && inputs.remove_updater == true }}
        working-directory: TVBoxOSC
        run: |
          echo "移除更新检测代码以及toast提示"
          # 查找所有Updater.java文件并处理
          find . -type f -name "Updater.java" | while read file; do
            echo "处理文件: $file"
            if [ -f "$file" ]; then
              sed -i 's/^\(.*App\.execute.*\)/\/\/ \1/' "$file"
              sed -i 's/^\(.*Notify\.show.*\)/\/\/ \1/' "$file"
              echo "✅ 已处理: $file"
            else
              echo "⚠️  文件不存在: $file"
            fi
          done

      - name: Geek modify
        if: ${{ env.commit && inputs.enable_geek_mod == true }}
        working-directory: TVBoxOSC
        run: |
          echo "这是 geek 专属定制【v1.8.2~v5.x.x】"
          # glide cache maximum
          cp -f ${{ github.workspace }}/.github/workflows/diy/OkHttpGlideModule.java app/src/main/java/com/fongmi/android/tv/utils/OkHttpGlideModule.java

      - name: config modify
        if: ${{ env.commit && inputs.enable_builtin_config == true }}
        working-directory: TVBoxOSC
        run: |
          echo "内置接口配置"
          
          # 获取用户输入的接口地址
          PRIMARY_URL="${{ inputs.config_url_primary }}"
          SECONDARY_URL="${{ inputs.config_url_secondary }}"
          
          # 如果为空则使用默认值
          if [ -z "$PRIMARY_URL" ]; then
            PRIMARY_URL="http://www.饭太硬.net/tv"
          fi
          if [ -z "$SECONDARY_URL" ]; then
            SECONDARY_URL="http://www.饭太硬.net/tv"
          fi
          
          echo "📡 主接口 (索引0): $PRIMARY_URL"
          echo "📡 备用接口 (索引1): $SECONDARY_URL"
          
          # 检查是否需要导入 Config 类
          if ! grep -q "import com.fongmi.android.tv.bean.Config;" app/src/main/java/com/fongmi/android/tv/App.java; then
            sed -i 's#\(package com.fongmi.android.tv;\)#\1\nimport com.fongmi.android.tv.bean.Config;#' app/src/main/java/com/fongmi/android/tv/App.java
          fi
          
          # 先删除可能已存在的 Config.create 行，避免重复插入
          sed -i '/Config\.create/d' app/src/main/java/com/fongmi/android/tv/App.java
          
          # 在 Notify.createChannel(); 后面插入配置
          sed -i 's#\(Notify.createChannel();\)#\1\n        Config.create(0, "'"$PRIMARY_URL"'");\n        Config.create(1, "'"$SECONDARY_URL"'");#' app/src/main/java/com/fongmi/android/tv/App.java
          
          echo "✅ 已内置接口配置"
          echo "====== 修改后的 App.java 相关部分 ======"
          grep -A 5 "Notify.createChannel" app/src/main/java/com/fongmi/android/tv/App.java

      - name: Build Configuration Summary
        if: ${{ env.commit }}
        run: |
          echo "=========================================="
          echo "📋 构建配置汇总："
          echo "=========================================="
          if [ "${{ inputs.modify_package_name }}" == "true" ]; then
            if [ -n "${{ inputs.package_name }}" ]; then
              echo "📦 包名: ${{ inputs.package_name }}"
            else
              echo "📦 包名: app.ok.tv (默认)"
            fi
          else
            echo "📦 包名: com.fongmi.android.tv (原包名，未修改)"
          fi
          echo "📡 主接口: ${{ inputs.enable_builtin_config == true && inputs.config_url_primary || '未启用' }}"
          echo "📡 备用接口: ${{ inputs.enable_builtin_config == true && inputs.config_url_secondary || '未启用' }}"
          echo "------------------------------------------"
          echo "⚙️  功能开关："
          echo "  - 修改包名: ${{ inputs.modify_package_name == true && '✅ 是' || '❌ 否' }}"
          echo "  - 移除 x86: ${{ inputs.remove_x86 == true && '✅ 是' || '❌ 否' }}"
          echo "  - 移除 Mobile: ${{ inputs.remove_mobile == true && '✅ 是' || '❌ 否' }}"
          echo "  - 移除 python: ${{ inputs.remove_python == true && '✅ 是' || '❌ 否' }}"
          echo "  - 移除更新器: ${{ inputs.remove_updater == true && '✅ 是' || '❌ 否' }}"
          echo "  - 极客修改: ${{ inputs.enable_geek_mod == true && '✅ 是' || '❌ 否' }}"
          echo "  - 内置接口: ${{ inputs.enable_builtin_config == true && '✅ 是' || '❌ 否' }}"
          echo "=========================================="

      - name: Setup JDK
        if: ${{ env.commit }}
        uses: actions/setup-java@main
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.jdkVersion }}

      - name: Setup Python
        if: ${{ env.commit }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Setup Gradle
        if: ${{ env.commit }}
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build With Gradle
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          chmod +x gradlew
          echo "org.gradle.daemon=true" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties
          echo "org.gradle.caching=true" >> gradle.properties
          ./gradlew assemblerelease --build-cache --parallel --daemon --warning-mode all

      - name: Prepare App
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          rm -rf apk/
          mkdir -p apk/
          find ~ -type d -iname "release" -print0 | while IFS= read -r -d '' dir; do
            find "$dir" -type f -name "*.apk" -exec sh -c 'cp "$1" "apk/${{ matrix.userName }}-${{ matrix.repoName }}-${{ matrix.branchName }}-${1##*/}"' sh {} \;
          done

      - name: Upload App To Artifact
        uses: actions/upload-artifact@v4
        if: ${{ env.commit }}
        with:
          name: ${{ matrix.userName }}-${{ matrix.repoName }}-${{ matrix.branchName }}
          path: |
            TVBoxOSC/apk/*

      - name: Release and Upload Assets
        uses: ncipollo/release-action@main
        if: ${{ env.commit }}
        with:
          name: ${{ matrix.userName }}_${{ matrix.repoName }}_${{ matrix.branchName }}_${{ env.tag }}
          tag: ${{ matrix.userName }}_${{ matrix.repoName }}_${{ matrix.branchName }}_${{ env.tag }}
          allowUpdates: true
          removeArtifacts: true
          artifacts: |
            TVBoxOSC/apk/*.apk
            TVBoxOSC/source-${{ env.commitS }}.*

      - uses: dev-drprasad/delete-older-releases@master
        with:
          keep_latest: 5
          delete_tags: true
          delete_tag_pattern: ${{ matrix.userName }}_${{ matrix.repoName }}_${{ matrix.branchName }}.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  clean:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Delete workflow runs
        uses: GitRML/delete-workflow-runs@main
        with:
          retain_days: 1
          keep_minimum_runs: 3
